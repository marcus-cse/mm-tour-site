<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcian Entertainment</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=Satoshi:wght@400;500;700&family=Work+Sans:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Satoshi', sans-serif;
    }
    .site-title {
      font-family: 'Archivo', sans-serif;
      text-transform: uppercase;
      font-weight: 900;
    }
    .fade-in-up {
      opacity: 0;
      transform: translateY(20px);
    }
    .fade-in-up.show {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.6s ease-out;
    }
    .fade-section {
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }
    .fade-section.visible {
      opacity: 1;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-700 text-white scroll-smooth">
  <!-- Navbar -->
  <header class="bg-gray-950/80 backdrop-blur-md py-4 sm:py-6 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-8 flex justify-start items-center">
      <a href="index.html" class="site-title text-xl sm:text-2xl md:text-3xl drop-shadow-lg text-left block focus:outline-none focus:ring-2 focus:ring-indigo-400" style="letter-spacing:0;">
        <span style="position:relative;">M<span style="margin-left:-0.32em; position:relative; z-index:1;">M</span></span>
      </a>
    </div>
  </header>
  <!-- Hero Section Only -->
  <section class="min-h-screen flex flex-col justify-center items-center px-2 sm:px-6 text-center">
    <h1 class="site-title text-4xl sm:text-5xl md:text-7xl mb-2 fade-in-up drop-shadow-xl">
      Marcus Maldonado
    </h1>
    <p class="text-lg sm:text-xl md:text-2xl max-w-2xl text-gray-300 mb-8 fade-in-up font-light">
      Providing soulful, professional performances for artists, weddings, and luxury experiences.
    </p>
    <a href="pages/tour-dates.html" class="bg-gradient-to-r from-indigo-500 to-indigo-700 hover:from-indigo-600 hover:to-indigo-800 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-2xl font-semibold shadow-lg transition-all duration-200 fade-in-up text-base sm:text-lg">
      View Tour Dates
    </a>
  </section>
  <script>
    // Animate fade-in on load
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.fade-in-up').forEach((el, i) => {
        setTimeout(() => {
          el.classList.add('show');
        }, i * 150 + 300);
      });
    });
  </script>
</body>
</html>
