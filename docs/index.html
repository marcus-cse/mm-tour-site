<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcus Maldonado — Guitarist</title>
  <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
  <meta property="og:title" content="Marcus Maldonado — Guitarist" />
  <meta property="og:description" content="Soulful, professional guitar performances for artists, weddings, and luxury experiences." />
  <meta property="og:image" content="https://marcus.band/assets/img/mm-backdrop.jpg" />
  <meta property="og:url" content="https://marcus.band" />
  <meta property="og:type" content="website" />
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    .gl-root.gl-home-only { height: 100%; display: flex; flex-direction: column; }
    .gl-hero.gl-hero--full { flex: 1; min-height: 0; }
    .gl-hero-now-val, .gl-hero-now-sub { transition: opacity 0.4s; }
    .gl-home-strip {
      background: var(--bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 48px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--fg);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="gl-root gl-home-only">
    <section class="gl-hero gl-hero--full">

      <!-- Background photo + scrim -->
      <div class="gl-hero-image">
        <img src="assets/img/mm-backdrop.jpg" alt="Marcus Maldonado on stage" class="gl-hero-img" />
        <div class="gl-hero-scrim"></div>
      </div>

      <!-- Nav -->
      <header class="gl-nav">
        <a href="./" class="gl-mark">MM</a>
        <nav>
          <a href="./" class="is-current">Home</a>
          <a href="tour/">Tour</a>
          <a href="map/">Map</a>
          <a href="about/">About</a>
        </nav>
        <a href="booking/" class="gl-nav-cta">Inquire</a>
        <button class="gl-nav-toggle" id="nav-toggle" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </header>

      <!-- Mobile nav overlay -->
      <div class="gl-nav-overlay" id="nav-overlay">
        <button class="gl-nav-overlay-close" id="nav-close" aria-label="Close menu">✕</button>
        <a href="./" class="is-current">Home</a>
        <a href="tour/">Tour</a>
        <a href="map/">Map</a>
        <a href="about/">About</a>
        <a href="booking/" class="gl-nav-overlay-cta">Inquire</a>
      </div>

      <!-- Hero text -->
      <div class="gl-hero-text">
        <div class="gl-hero-eyebrow">
          <span>GUITARIST · ENTREPRENEUR</span>
        </div>
        <h1 class="gl-hero-title"><span style="display:block;margin-bottom:0.12em">MARCUS</span>MALDONADO</h1>
        <p class="gl-hero-tag-line">
          Soulful, professional guitar performances<br>
          for artists, weddings, and luxury experiences.
        </p>
      </div>

      <!-- Footer strip -->
      <div class="gl-hero-foot">
        <div class="gl-hero-foot-l">
          <a href="tour/" class="gl-hero-link">
            <span class="gl-hero-link-num">01</span>
            <span>VIEW TOUR DATES</span>
            <span>→</span>
          </a>
          <a href="booking/" class="gl-hero-link">
            <span class="gl-hero-link-num">02</span>
            <span>BOOK A DATE</span>
            <span>→</span>
          </a>
        </div>
        <div class="gl-hero-now">
          <div class="gl-hero-now-label">NEXT SHOW</div>
          <div class="gl-hero-now-val" id="next-show-val">—</div>
          <div class="gl-hero-now-sub" id="next-show-sub" style="font-size:12px;opacity:0.7;margin-top:4px;">Loading…</div>
        </div>
      </div>

    </section>

    <div class="gl-home-strip">
      <span>© <span id="home-year"></span> MARCUS MALDONADO</span>
      <span>BUILT IN TEXAS</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
document.getElementById('home-year').textContent = new Date().getFullYear();
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1emqiAiZPufCuJ0n9bkewzMdNzRAea9sJopSlLKkdqcs/export?format=csv';

    function parseShowDate(dateStr) {
      return dayjs(`${dateStr} ${dayjs().year()}`);
    }

    const fmtDay   = d => parseShowDate(d).format('DD');
    const fmtMonth = d => parseShowDate(d).format('MMM').toUpperCase();

    fetch(SHEET_URL)
      .then(r => r.text())
      .then(text => {
        const rows = Papa.parse(text, { header: true, skipEmptyLines: true }).data;
        const today = dayjs();
        const shows = rows
          .filter(r => r.date)
          .map(r => ({
            date: r.date,
            artist: (r.artist || '').trim(),
            venue: (r.venue || '').trim(),
            city: `${(r.city || '').trim()}, ${(r.state || '').trim()}`,
            status: (r.ticket_url || '').trim() ? 'tickets' : 'private',
          }))
          .filter(s => parseShowDate(s.date).isValid() && parseShowDate(s.date) >= today)
          .sort((a, b) => parseShowDate(a.date) - parseShowDate(b.date));

        const next = shows[0];
        if (next) {
          document.getElementById('next-show-val').textContent =
            `${fmtMonth(next.date)} ${fmtDay(next.date)} · ${next.artist}`;
          document.getElementById('next-show-sub').textContent =
            next.status === 'private' ? 'Private engagement' : `${next.venue} — ${next.city}`;
        } else {
          document.getElementById('next-show-val').textContent = 'TBA';
          document.getElementById('next-show-sub').textContent = 'Stay tuned';
        }
      })
      .catch(() => {
        document.getElementById('next-show-sub').textContent = '';
      });
  </script>
</body>
</html>
