<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Map | Marcian Entertainment</title>
  <link rel="icon" type="image/png" href="../assets/mm_logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Satoshi', sans-serif; }
    .site-title { font-family: 'Archivo', sans-serif; text-transform: uppercase; font-weight: 900; }
    .responsive-backdrop-pos { object-position: center top 120px; }
    @media (min-width: 1024px) { .responsive-backdrop-pos { object-position: center top 220px; } }
  </style>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-800 text-white scroll-smooth relative">
  <header class="bg-gray-950/80 backdrop-blur-md py-4 sm:py-6 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-8 flex justify-start items-center">
      <a href="../index.html" class="site-title text-xl sm:text-2xl md:text-3xl drop-shadow-lg text-left block focus:outline-none focus:ring-2 focus:ring-indigo-400" style="letter-spacing:0;">
        <span style="position:relative;">M<span style="margin-left:-0.32em; position:relative; z-index:1;">M</span></span>
      </a>
    </div>
  </header>
  <div class="fixed left-0 right-0 z-0 pointer-events-none select-none" style="top:64px; bottom:0;">
    <img src="../assets/mm_backdrop.jpg" alt="Backdrop" class="w-full h-full object-cover opacity-30 responsive-backdrop-pos" />
  </div>
  <main class="flex flex-col items-center justify-center min-h-[80vh] py-10">
    <div class="w-full max-w-2xl mx-auto">
      <div id="flight-map" class="w-full h-[400px] rounded-xl overflow-hidden shadow-lg"></div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    async function fetchShows() {
      const sheetUrl = 'https://docs.google.com/spreadsheets/d/1emqiAiZPufCuJ0n9bkewzMdNzRAea9sJopSlLKkdqcs/export?format=csv';
      const response = await fetch(sheetUrl);
      const text = await response.text();
      const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
      return parsed.data;
    }
    // --- FLIGHT MAP LOGIC ---
    async function renderFlightMap() {
      const map = L.map('flight-map', {
        zoomControl: false,
        attributionControl: false,
      });
      const shows = await fetchShows();
      const points = shows
        .filter(show => show.latitude && show.longitude)
        .map(show => [parseFloat(show.latitude), parseFloat(show.longitude)]);
      if (points.length === 0) return;
      map.fitBounds(points, { padding: [40, 40] });
      // Use CartoDB Dark Matter tiles for dark mode
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
        attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a>'
      }).addTo(map);
      // Animated path logic
      let path;
      let markers = [];
      function animatePath() {
        let step = 2;
        if (path) path.remove();
        markers.forEach(m => m.remove());
        markers = [];
        path = L.polyline([], {
          color: '#6366f1',
          weight: 5,
          opacity: 0.8,
          lineJoin: 'round',
          dashArray: '10 8',
        }).addTo(map);
        function drawStep() {
          if (step > points.length) {
            setTimeout(() => {
              animatePath();
            }, 1200); // Pause before repeating
            return;
          }
          path.setLatLngs(points.slice(0, step));
          // Add marker for the current point as it's reached
          if (step - 1 < points.length) {
            const marker = L.circleMarker(points[step - 1], {
              radius: 7,
              color: '#fff',
              fillColor: '#6366f1',
              fillOpacity: 0.95,
              weight: 2,
            }).addTo(map);
            markers.push(marker);
          }
          step++;
          setTimeout(drawStep, 350);
        }
        drawStep();
      }
      animatePath();
    }
    document.addEventListener('DOMContentLoaded', () => {
      renderFlightMap();
    });
  </script>
</body>
</html>
